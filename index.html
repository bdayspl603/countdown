<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown to May 4, 2026</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1b2a;
      color: #e0e1dd;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    .time {
      font-size: 2em;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }
    .amount {
      font-size: 2.2em;
      font-weight: bold;
      color: #e0e1dd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Countdown to May 4, 2026</h1>
    <div class="time" id="timer"></div>
    <div class="amount"><h1>₹10,000</h1></div>
  </div>

  <script>
    function updateCountdown() {
      const targetDate = new Date("May 4, 2026 00:00:00").getTime();
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance < 0) {
        document.getElementById("timer").innerHTML = "The day has arrived!";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("timer").innerHTML =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
